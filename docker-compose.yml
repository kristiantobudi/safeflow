services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: safeflow-api
    restart: always
    ports:
      - "1945:1945"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - redis
    networks:
      - safeflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: safeflow-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:1945/api/v1
    depends_on:
      - api
    networks:
      - safeflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: safeflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - safeflow-network

networks:
  safeflow-network:
    driver: bridge

volumes:
  redis_data: